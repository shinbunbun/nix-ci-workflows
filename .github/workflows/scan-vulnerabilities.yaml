# Nix 脆弱性スキャン Reusable Workflow
#
# vulnxscan (vulnix + grype + osv の aggregator) で Nix flake target の
# runtime closure をスキャンし、結果を job summary に出力する (report-only)。
#
# 使用方法 (caller 側で discover-targets と組み合わせて fan-out):
#   scan-nixos:
#     needs: discover
#     if: needs.discover.outputs.has-nixos == 'true'
#     strategy:
#       matrix: ${{ fromJSON(needs.discover.outputs.nixos-matrix) }}
#     uses: shinbunbun/nix-ci-workflows/.github/workflows/scan-vulnerabilities.yaml@main
#     with:
#       runner: '["self-hosted", "nixos", "x86_64-linux"]'
#       skip-nix-install: true
#       target: ".#nixosConfigurations.${{ matrix.configuration }}.config.system.build.toplevel"
#   scan-darwin:
#     ...
#     with:
#       runner: '["self-hosted", "darwin", "aarch64-darwin"]'
#       vulnix-nocheck: true   # darwin は vulnix の checkPhase が sandbox 非互換のため必須
#       target: ".#darwinConfigurations.${{ matrix.configuration }}.config.system.build.toplevel"

name: Scan Vulnerabilities

on:
  workflow_call:
    inputs:
      runner:
        description: 'GitHub Actions runner (string か JSON 配列)'
        type: string
        default: 'ubuntu-latest'
      target:
        description: 'スキャン対象の Nix flake target (runtime closure)'
        type: string
        required: true
      triage:
        description: 'repology triage 分類を実行する'
        type: boolean
        default: true
      tracker:
        description: 'Nixpkgs Security Tracker で no-fix/UNKNOWN を権威再検証する (#285c/#289)'
        type: boolean
        default: true
      tracker-url:
        description: 'Nixpkgs Security Tracker のベース URL'
        type: string
        default: 'https://tracker.security.nixos.org'
      identity:
        description: 'パッケージ identity (src.url) で UNKNOWN/spot-check の名前衝突 FP を検出する (#285)'
        type: boolean
        default: true
      vulnix-nocheck:
        description: 'vulnix を doCheck/checkPhase 無効版に差し替える (darwin で必須)'
        type: boolean
        default: false
      whitelist:
        description: 'caller repo 内の vulnxscan whitelist CSV パス (空なら無効)'
        type: string
        default: ''
      skip-nix-install:
        description: 'Nix インストールをスキップ (self-hosted NixOS/Darwin runner 用)'
        type: boolean
        default: false
      ci-workflows-ref:
        description: 'helper (script/flake) を取得する nix-ci-workflows の ref'
        type: string
        default: 'main'
      upload-report:
        description: 'NOTIFY を artifact (vulnxscan-signal-*) にアップロードする (集約 job 用)'
        type: boolean
        default: true
    secrets:
      NVD_API_KEY:
        description: 'NVD API key (任意)。caller から forward する。未指定でも動くが rate-limit が緩み identity 判定 (#285/#289 の NVD CPE 照会) が安定・高速化する'
        required: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ${{ startsWith(inputs.runner, '[') && fromJSON(inputs.runner) || inputs.runner }}
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v6

      - name: Checkout nix-ci-workflows helpers
        uses: actions/checkout@v6
        with:
          repository: shinbunbun/nix-ci-workflows
          ref: ${{ inputs.ci-workflows-ref }}
          path: .nix-ci-workflows

      - name: Install Nix with flakes enabled
        if: ${{ !inputs.skip-nix-install }}
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}

      - name: Run vulnxscan
        env:
          TARGET: ${{ inputs.target }}
          TRIAGE: ${{ inputs.triage }}
          NOCHECK: ${{ inputs.vulnix-nocheck }}
          WHITELIST: ${{ inputs.whitelist }}
        run: |
          set -euo pipefail
          ARGS=()
          [ "$TRIAGE" = "true" ] && ARGS+=(--triage)
          [ -n "$WHITELIST" ] && ARGS+=(--whitelist "$WHITELIST")
          OVERRIDE=()
          if [ "$NOCHECK" = "true" ]; then
            # darwin: vulnix の checkPhase (pytest の socket/network test) が darwin の
            # nix build sandbox 非互換でビルド不可のため、doCheck/checkPhase 無効版に差し替える。
            OVERRIDE=(--override-input vulnix "path:.nix-ci-workflows/ci/vulnix-nocheck")
          fi
          # ${ARR[@]+"${ARR[@]}"} 形式で空配列展開を set -u セーフに (bash 3.2 / macOS 対策)
          nix run github:tiiuae/sbomnix#vulnxscan ${OVERRIDE[@]+"${OVERRIDE[@]}"} -- \
            "$TARGET" ${ARGS[@]+"${ARGS[@]}"} --out "$RUNNER_TEMP/vulns.csv"

      - name: Capture closure graph (pin 検出 + 入口逆引き)
        if: always()
        env:
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          # vulnxscan が target を realise 済みなので path-info は速い。
          # --json で各 path の references を含む参照グラフを取得し、summary script が
          #   pin 検出 (同 package が複数版 = auto-update で直らない)
          #   入口逆引き (脆弱版を closure に入れた宣言ルートへの到達)
          # の両方に使う。JSON パースは python 側 (darwin runner では jq/sed が PATH に
          # 無いことがあるため外部ツール非依存にする)。
          nix path-info -r --json "$TARGET" > "$RUNNER_TEMP/closure.json" 2>/dev/null || true

      - name: Resolve config provenance (入口/設定)
        if: always()
        env:
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          # 脆弱版が「どの設定 (systemPackages/home.packages) で closure に入ったか」を
          # 特定するための宣言ルート (outPath+name+file) を module system から取得する。
          # TARGET (.#<class>.<name>.config...) から class/name を抽出。
          CLASS=""; NAME=""
          case "$TARGET" in
            *nixosConfigurations.*) CLASS="nixosConfigurations" ;;
            *darwinConfigurations.*) CLASS="darwinConfigurations" ;;
          esac
          # <class>.<name> の <name> を取り出す (bash パラメータ展開のみ; sed 非依存)
          if [ -n "$CLASS" ]; then
            rest="${TARGET#*${CLASS}.}"
            NAME="${rest%%.*}"
          fi
          if [ -n "$CLASS" ] && [ -n "$NAME" ]; then
            # provenance eval は getFlake を使うため --impure。失敗しても scan は継続
            # (summary script が roots 無しなら closure の由来にフォールバックする)。
            nix eval --json --impure \
              --expr "import .nix-ci-workflows/ci/scripts/vulnxscan_provenance.nix { flakePath = \"$PWD\"; class = \"$CLASS\"; name = \"$NAME\"; }" \
              > "$RUNNER_TEMP/roots.json" 2>"$RUNNER_TEMP/roots.err" \
              || { echo "::warning::provenance eval 失敗 (入口は由来にフォールバック)"; cat "$RUNNER_TEMP/roots.err" | head -20; rm -f "$RUNNER_TEMP/roots.json"; }
          else
            echo "::notice::TARGET から class/name を抽出できず、入口逆引きをスキップ"
          fi

      - name: Re-verify via Nixpkgs Security Tracker (権威ソース)
        # triage 無効時は classify が無く降格対象 bucket も無いので tracker 照会をスキップ
        if: always() && inputs.tracker && inputs.triage
        env:
          TRACKER_URL: ${{ inputs.tracker-url }}
        run: |
          set -euo pipefail
          # triage CSV の CVE を Nixpkgs Security Tracker に照会し {cve: status} を tracker.json に。
          # repology 単独で出した no-fix/UNKNOWN を nixpkgs 権威ステータスで再検証する (#285c/#289)。
          # 失敗しても scan は継続 (summary 側が tracker.json 無し = override 無しにフォールバック)。
          CSV="$RUNNER_TEMP/vulns.triage.csv"
          [ -f "$CSV" ] || CSV="$RUNNER_TEMP/vulns.csv"
          if [ -f "$CSV" ]; then
            nix run nixpkgs#python3 -- \
              .nix-ci-workflows/ci/scripts/vulnxscan_tracker.py \
              "$CSV" "$RUNNER_TEMP/tracker.json" "$TRACKER_URL" \
              || { echo "::warning::tracker 照会失敗 (権威再検証 OFF で継続)"; rm -f "$RUNNER_TEMP/tracker.json"; }
          fi

      - name: Adjudicate via OSV/NVD (名前衝突 + 該当判定)
        # triage 無効時は classify が無く対象 bucket (UNKNOWN/spot-check) も無いのでスキップ
        if: always() && inputs.identity && inputs.triage
        env:
          TARGET: ${{ inputs.target }}
          # NVD API key (任意)。secrets に NVD_API_KEY があれば rate-limit が緩み速くなる。
          # 無くても動く (呼び出し間隔を空けるだけ)。
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          set -euo pipefail
          # UNKNOWN / spot-check の CVE について OSV/NVD で 2 種類を判定して identity.json に書く (#285):
          #   ① 名前衝突 FP   = nixpkgs の src.url repo と CVE (OSV/NVD references) の repo が別物
          #   ② 該当確定 (昇格) = NVD CPE の版範囲 (vendor 一致) に現在版が入る
          # src.url/homepage は scan した当の config の pkgs から eval する (= 実際のビルド対象)。
          # TARGET (.#<class>.<name>.config...) から pkgs_base (.#<class>.<name>.pkgs) を組む。
          CSV="$RUNNER_TEMP/vulns.triage.csv"
          [ -f "$CSV" ] || CSV="$RUNNER_TEMP/vulns.csv"
          CLASS=""; NAME=""
          case "$TARGET" in
            *nixosConfigurations.*) CLASS="nixosConfigurations" ;;
            *darwinConfigurations.*) CLASS="darwinConfigurations" ;;
          esac
          PKGS_BASE=""
          if [ -n "$CLASS" ]; then
            rest="${TARGET#*${CLASS}.}"
            NAME="${rest%%.*}"
            [ -n "$NAME" ] && PKGS_BASE=".#${CLASS}.${NAME}.pkgs"
          fi
          if [ -f "$CSV" ]; then
            # 失敗 (ネット/eval/PKGS_BASE 空) しても scan は継続。summary 側は identity.json
            # 無し = 判定 OFF にフォールバックする (= 現状維持で FN を増やさない)。
            nix run nixpkgs#python3 -- \
              .nix-ci-workflows/ci/scripts/vulnxscan_identity.py \
              "$CSV" "$RUNNER_TEMP/identity.json" "$PKGS_BASE" \
              || { echo "::warning::OSV/NVD 判定失敗 (判定 OFF で継続)"; rm -f "$RUNNER_TEMP/identity.json"; }
          fi

      - name: Build job summary
        if: always()
        env:
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          CSV="$RUNNER_TEMP/vulns.triage.csv"
          [ -f "$CSV" ] || CSV="$RUNNER_TEMP/vulns.csv"
          if [ -f "$CSV" ]; then
            # 第4引数 notify.json = NOTIFY を集約 (Issue 起票) 用に JSON 出力
            # 第5引数 roots.json = 入口 (設定) 逆引き用の宣言ルート (無ければ由来にフォールバック)
            # 第6引数 tracker.json = Nixpkgs Security Tracker の {cve: status} (無ければ再検証 OFF)
            # 第7引数 identity.json = 名前衝突 FP {vuln_id: {...}} (無ければ名前衝突検出 OFF)
            ROOTS="$RUNNER_TEMP/roots.json"; [ -f "$ROOTS" ] || ROOTS=""
            TRACKER="$RUNNER_TEMP/tracker.json"; [ -f "$TRACKER" ] || TRACKER=""
            IDENTITY="$RUNNER_TEMP/identity.json"; [ -f "$IDENTITY" ] || IDENTITY=""
            nix run nixpkgs#python3 -- \
              .nix-ci-workflows/ci/scripts/vulnxscan_summary.py \
              "$CSV" "$TARGET" "$RUNNER_TEMP/closure.json" "$RUNNER_TEMP/notify.json" "$ROOTS" "$TRACKER" "$IDENTITY" \
              >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## vulnxscan: 出力 CSV なし（スキャン失敗の可能性）" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Compute artifact name
        if: always() && inputs.upload-report
        id: artifact
        env:
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          # bash パラメータ展開のみで sanitize (darwin runner では sed/cut が PATH に
          # 無いことがあるため外部ツールに依存しない)。
          safe="${TARGET//[^a-zA-Z0-9._-]/-}"
          echo "name=vulnxscan-signal-${safe:0:100}" >> "$GITHUB_OUTPUT"

      - name: Upload NOTIFY report
        if: always() && inputs.upload-report && steps.artifact.outputs.name != ''
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ runner.temp }}/notify.json
          if-no-files-found: ignore
