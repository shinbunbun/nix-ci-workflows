# deploy-rsデプロイ Reusable Workflow
#
# WireGuard VPN経由でSSH接続し、deploy-rsでNixOSデプロイを実行する。
# デプロイ結果をDiscord通知する。
#
# 使用方法:
#   uses: shinbunbun/nix-ci-workflows/.github/workflows/deploy-nix.yaml@main
#   with:
#     deploy-target: ".#homeMachine"
#     ssh-hostname: homemachine
#     ssh-host: "192.168.1.3"

name: Deploy NixOS

on:
  workflow_call:
    inputs:
      deploy-target:
        description: 'deploy-rs target (e.g. ".#homeMachine", ".#nixos-desktop")'
        required: true
        type: string
      ssh-hostname:
        description: 'SSH config Host name'
        required: true
        type: string
      ssh-host:
        description: 'SSH connection IP address'
        required: true
        type: string
      ssh-port:
        description: 'SSH port'
        required: false
        type: string
        default: '31415'
      ssh-user:
        description: 'SSH user'
        required: false
        type: string
        default: 'deploy'
      needs-sops:
        description: 'Whether SOPS key setup is needed'
        required: false
        type: boolean
        default: false
      environment:
        description: 'GitHub environment for deployment protection rules (e.g. production)'
        required: false
        type: string
        default: ''
      runner:
        description: 'Runner label (e.g. "ubuntu-latest" or JSON array)'
        required: false
        type: string
        default: 'ubuntu-latest'
      skip-nix-install:
        description: 'Skip Nix installation (for self-hosted NixOS runners)'
        required: false
        type: boolean
        default: false
      needs-wireguard:
        description: 'Whether WireGuard VPN setup is needed'
        required: false
        type: boolean
        default: true
      attic-server:
        description: 'Attic server URL'
        required: false
        type: string
        default: 'https://cache.shinbunbun.com'
    secrets:
      AUTHENTIK_CLIENT_ID:
        required: false
      ATTIC_TOKEN:
        required: false
      ATTIC_READ_TOKEN:
        required: false
      DEPLOY_SSH_KEY:
        required: true
      DISCORD_WEBHOOK_URL:
        required: false
      SOPS_AGE_KEY:
        required: false

# permissions はあえて宣言せず caller から継承する。
# reusable が caller より広い permissions を宣言すると、それを付与していない caller は
# startup_failure になる。caller 側で必要な権限を付与すること:
#   - 必須: id-token: write (Attic OIDC), contents: read
# dotfiles-private の deploy.yaml は id-token: write + contents: read を宣言済み。

jobs:
  deploy:
    runs-on: ${{ startsWith(inputs.runner, '[') && fromJSON(inputs.runner) || inputs.runner }}
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup WireGuard VPN
        if: inputs.needs-wireguard
        uses: shinbunbun/nix-ci-workflows/.github/actions/wireguard@main
        with:
          authentik-client-id: ${{ secrets.AUTHENTIK_CLIENT_ID }}

      - name: Setup Nix + Attic (+ SOPS)
        uses: shinbunbun/nix-ci-workflows/.github/actions/setup-nix-attic@main
        with:
          install-nix: ${{ !inputs.skip-nix-install }}
          use-attic: true
          needs-sops: ${{ inputs.needs-sops && !inputs.skip-nix-install }}
          attic-read-token: ${{ secrets.ATTIC_READ_TOKEN }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Setup SSH for deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          cat >> ~/.ssh/config << EOF
          Host ${{ inputs.ssh-hostname }}
            HostName ${{ inputs.ssh-host }}
            Port ${{ inputs.ssh-port }}
            User ${{ inputs.ssh-user }}
            IdentityFile ${HOME}/.ssh/deploy_key
            UserKnownHostsFile ${HOME}/.ssh/known_hosts
            StrictHostKeyChecking no
          EOF

          # DynamicUser環境ではSSHがgetpwuid()で~を/に解決するため、
          # deploy-rsやnixが内部でsshを呼ぶ際にconfigが見つからない。
          # SSHラッパーで全てのSSH呼び出しに-Fを付与する。
          REAL_SSH=$(command -v ssh)
          SSH_WRAPPER_DIR="${HOME}/.local/bin"
          mkdir -p "${SSH_WRAPPER_DIR}"
          cat > "${SSH_WRAPPER_DIR}/ssh" << WRAPPER_EOF
          #!/usr/bin/env bash
          exec ${REAL_SSH} -F ${HOME}/.ssh/config "\$@"
          WRAPPER_EOF
          chmod +x "${SSH_WRAPPER_DIR}/ssh"
          echo "${SSH_WRAPPER_DIR}" >> $GITHUB_PATH

      - name: Test SSH connectivity
        run: |
          ssh ${{ inputs.ssh-hostname }} 'echo "SSH connection via WireGuard OK"'
        timeout-minutes: 2

      - name: Deploy with deploy-rs
        run: |
          nix run github:shinbunbun/nix-ci-workflows#deploy-rs -- \
            --skip-checks \
            ${{ inputs.deploy-target }}

      - name: Notify deployment success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [[ -z "$DISCORD_WEBHOOK_URL" ]]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"🚀 **デプロイ成功**\\n\\nTarget: \`${{ inputs.deploy-target }}\`\\nCommit: \`${{ github.sha }}\`\\nhttps://github.com/${{ github.repository }}/commit/${{ github.sha }}\"
            }"

      - name: Notify deployment failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [[ -z "$DISCORD_WEBHOOK_URL" ]]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"❌ **デプロイ失敗**\\n\\nTarget: \`${{ inputs.deploy-target }}\`\\nLogs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
