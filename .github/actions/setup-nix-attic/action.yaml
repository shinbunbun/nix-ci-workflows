name: 'Setup Nix + Attic'
description: >-
  Install Nix (flakes enabled), optionally configure the Attic binary cache
  substituter + netrc authentication, and optionally provision the SOPS age key.
  3 つの reusable workflow (build-nix / deploy-nix / update-tools) に逐語コピーされていた
  Nix install / Attic auth / SOPS setup ステップを 1 箇所に集約する。
  inputs の既定値は従来の逐語値そのままで、後方互換を保つ。

inputs:
  attic-host:
    description: 'Attic server hostname used in the netrc machine entry'
    required: false
    default: 'cache.shinbunbun.com'
  substituters:
    description: 'Space-separated substituters written to extra_nix_config (Attic 有効時のみ)'
    required: false
    default: 'https://cache.nixos.org https://cache.shinbunbun.com/main'
  trusted-public-keys:
    description: 'Space-separated trusted-public-keys written to extra_nix_config (Attic 有効時のみ)'
    required: false
    default: 'cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= main:EMoov6FniyxjYhY24OcZ02dOIWKu4feJH7uGRjgwwUc='
  use-attic:
    description: >-
      true なら Attic substituter / netrc を含む extra_nix_config を書き、Attic 認証を行う。
      false なら experimental-features のみの最小構成で Nix を入れ、Attic 認証をスキップする。
    required: false
    default: 'true'
  install-nix:
    description: 'false にすると Nix install をスキップする (self-hosted NixOS runner 用)'
    required: false
    default: 'true'
  attic-token-mode:
    description: >-
      Attic netrc token の解決方法。
      "fallback": ATTIC_READ_TOKEN → ATTIC_TOKEN フォールバックし、空なら netrc を書かない。
      "direct": attic-token をそのまま無条件で netrc に書く (update-tools 互換)。
    required: false
    default: 'fallback'
  attic-read-token:
    description: 'Attic read-only token (fallback モードで優先)'
    required: false
    default: ''
  attic-token:
    description: 'Attic token (fallback モードのフォールバック / direct モードで使用)'
    required: false
    default: ''
  extra-nix-config:
    description: >-
      両 Install ステップの extra_nix_config 末尾に追記する追加行
      (例: access-tokens)。空なら従来と等価。
    required: false
    default: ''
  needs-sops:
    description: 'true なら SOPS age key を /var/lib/sops-nix/key.txt に書く'
    required: false
    default: 'false'
  sops-age-key:
    description: 'SOPS age 秘密鍵 (needs-sops が true のとき使用)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install Nix with flakes enabled (with Attic)
      if: ${{ inputs.install-nix == 'true' && inputs.use-attic == 'true' }}
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          substituters = ${{ inputs.substituters }}
          trusted-public-keys = ${{ inputs.trusted-public-keys }}
          netrc-file = /etc/nix/netrc
          fallback = true
          connect-timeout = 5
          ${{ inputs.extra-nix-config }}

    - name: Install Nix with flakes enabled (without Attic)
      if: ${{ inputs.install-nix == 'true' && inputs.use-attic != 'true' }}
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          ${{ inputs.extra-nix-config }}

    - name: Setup SOPS
      if: ${{ inputs.needs-sops == 'true' }}
      shell: bash
      env:
        SOPS_AGE_KEY: ${{ inputs.sops-age-key }}
      run: |
        sudo mkdir -p /var/lib/sops-nix
        echo "$SOPS_AGE_KEY" | sudo tee /var/lib/sops-nix/key.txt > /dev/null
        sudo chmod 600 /var/lib/sops-nix/key.txt

    - name: Setup Attic authentication (fallback)
      if: ${{ inputs.use-attic == 'true' && inputs.install-nix == 'true' && inputs.attic-token-mode == 'fallback' }}
      shell: bash
      env:
        ATTIC_HOST: ${{ inputs.attic-host }}
        ATTIC_READ_TOKEN: ${{ inputs.attic-read-token }}
        ATTIC_TOKEN: ${{ inputs.attic-token }}
      run: |
        TOKEN="$ATTIC_READ_TOKEN"
        if [[ -z "$TOKEN" ]]; then
          TOKEN="$ATTIC_TOKEN"
        fi
        if [[ -n "$TOKEN" ]]; then
          echo "machine ${ATTIC_HOST} password $TOKEN" | sudo tee /etc/nix/netrc > /dev/null
          sudo chmod 600 /etc/nix/netrc
        fi

    - name: Setup Attic authentication (direct)
      if: ${{ inputs.use-attic == 'true' && inputs.install-nix == 'true' && inputs.attic-token-mode == 'direct' }}
      shell: bash
      env:
        ATTIC_HOST: ${{ inputs.attic-host }}
        ATTIC_TOKEN: ${{ inputs.attic-token }}
      run: |
        echo "machine ${ATTIC_HOST} password ${ATTIC_TOKEN}" | sudo tee /etc/nix/netrc > /dev/null
        sudo chmod 600 /etc/nix/netrc
