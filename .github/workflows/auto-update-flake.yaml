# Flake自動更新 Reusable Workflow
#
# nix flake update でflake.lockを更新し、PRを自動作成する。
# 呼び出し側でscheduleトリガーとworkflow_dispatchを設定する想定。
#
# 使用方法:
#   uses: shinbunbun/nix-ci-workflows/.github/workflows/auto-update-flake.yaml@main
#   secrets:
#     PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

name: Auto Update Flakes

on:
  workflow_call:
    inputs:
      runner:
        description: 'GitHub Actions runner'
        required: false
        type: string
        default: 'ubuntu-latest'
      skip-nix-install:
        description: 'Skip Nix installation (for self-hosted NixOS runners)'
        type: boolean
        default: false
    secrets:
      PAT_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flakes:
    runs-on: ${{ startsWith(inputs.runner, '[') && fromJSON(inputs.runner) || inputs.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Nix
        if: ${{ !inputs.skip-nix-install }}
        uses: shinbunbun/nix-ci-workflows/.github/actions/setup-nix-attic@main
        with:
          install-nix: 'true'
          use-attic: 'false'
          extra-nix-config: |
            access-tokens = github.com=${{ secrets.PAT_TOKEN }}

      - name: Update flake
        run: |
          nix flake update

      - name: Check for changes
        id: changes
        run: |
          if ! git diff --exit-code; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request for flake.lock update
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        id: create-pr
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "Auto-update flake.lock"
          title: "Auto-update flake.lock"
          body: |
            This PR updates flake.lock with the latest input updates via `nix flake update`.

            Please review and merge if everything looks OK.
          branch: auto/update-flake-lock
          base: main
          draft: false

      - name: Enable auto-merge
        if: steps.changes.outputs.changed == 'true' && steps.create-pr.outputs.pull-request-number != ''
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
