# CIツール定期ビルド＆キャッシュ更新 Workflow
#
# attic CLIとdeploy-rsをビルドしてAtticキャッシュにpushする。
# 他リポジトリのCIはキャッシュからプリビルド済みバイナリを取得できる。

name: Update CI Tools Cache

on:
  push:
    paths:
      - 'flake.nix'
      - 'flake.lock'
  pull_request:
    paths:
      - 'ci/scripts/**'
      - '.github/workflows/update-tools.yaml'
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  test-vulnxscan-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Nix (without Attic)
        uses: ./.github/actions/setup-nix-attic
        with:
          use-attic: false

      - name: Run vulnxscan pytest
        run: |
          nix run nixpkgs#python3Packages.pytest -- ci/scripts/tests/ -q

  build-and-cache:
    # キャッシュ更新は push (flake 変更) / schedule / dispatch のみ。
    # pull_request (ci/scripts のテスト目的) では重いマトリクスビルドと
    # attic push を走らせない。
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Nix + Attic
        uses: ./.github/actions/setup-nix-attic
        with:
          use-attic: true
          attic-token-mode: direct
          attic-token: ${{ secrets.ATTIC_TOKEN }}

      - name: Build attic
        run: |
          nix build ".#packages.${{ matrix.system }}.attic" \
            --print-build-logs \
            --out-link result-attic

      - name: Build deploy-rs
        run: |
          nix build ".#packages.${{ matrix.system }}.deploy-rs" \
            --print-build-logs \
            --out-link result-deploy-rs

      - name: Push to Attic cache
        run: |
          ./result-attic/bin/attic login ci https://cache.shinbunbun.com ${{ secrets.ATTIC_TOKEN }}
          ./result-attic/bin/attic cache create main || echo "Cache already exists"

          echo "Pushing attic to cache..."
          ./result-attic/bin/attic push -j 5 main result-attic || echo "Failed to push attic (non-fatal)"

          echo "Pushing deploy-rs to cache..."
          ./result-attic/bin/attic push -j 5 main result-deploy-rs || echo "Failed to push deploy-rs (non-fatal)"
        continue-on-error: true
