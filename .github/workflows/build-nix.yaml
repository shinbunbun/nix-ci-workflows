# 単一ターゲットビルド用 Reusable Workflow
#
# 指定されたNixビルドターゲットをビルドし、Atticキャッシュにプッシュする。
# WireGuard VPN接続はオプション（needs-wireguard で制御）。
# Atticキャッシュ連携はオプション（use-attic で制御）。
# SOPS秘密鍵のセットアップもオプション。
#
# report-closure-diff を有効にすると、ビルドした closure を base ref
# (closure-diff-base-ref, 既定 main) の同一ターゲット closure と
# `nix store diff-closures` で比較し、対象ブランチの open PR に
# ターゲット別 sticky comment として結果を投稿する（flake.lock 更新 PR で
# 実際に上がったパッケージバージョンを可視化する用途）。非致命。
#
# 使用方法:
#   uses: shinbunbun/nix-ci-workflows/.github/workflows/build-nix.yaml@main
#   with:
#     runner: ubuntu-latest
#     build-target: ".#nixosConfigurations.homeMachine.config.system.build.toplevel"
#     result-name: homeMachine
#     needs-sops: true
#     needs-wireguard: true

name: Build Nix Target

on:
  workflow_call:
    inputs:
      runner:
        description: 'GitHub Actions runner (e.g. ubuntu-latest, macos-latest)'
        required: true
        type: string
      build-target:
        description: 'Nix build target expression'
        required: true
        type: string
      result-name:
        description: '--out-link name'
        required: true
        type: string
      needs-sops:
        description: 'Whether SOPS key setup is needed'
        required: false
        type: boolean
        default: false
      needs-wireguard:
        description: 'Whether WireGuard VPN is needed for Attic access'
        required: false
        type: boolean
        default: false
      use-attic:
        description: 'Whether to use Attic binary cache (substituter + push)'
        required: false
        type: boolean
        default: true
      push-to-cache:
        description: 'Whether to push build results to Attic cache'
        required: false
        type: boolean
        default: true
      free-disk-space:
        description: 'Whether to free disk space before building (useful for large NixOS builds on Ubuntu runners)'
        required: false
        type: boolean
        default: false
      attic-server:
        description: 'Attic server URL for push (internal or public)'
        required: false
        type: string
        default: 'https://cache.shinbunbun.com'
      skip-nix-install:
        description: 'Skip Nix installation (for self-hosted NixOS runners)'
        required: false
        type: boolean
        default: false
      max-jobs:
        description: 'Nix --max-jobs value. Empty = Nix default. Set to "1" to serialize builds (workaround for macos-latest GitHub-hosted parallel-build deadlock).'
        required: false
        type: string
        default: ''
      report-closure-diff:
        description: 'Whether to compute `nix store diff-closures` vs a base ref and post it as a per-target sticky PR comment'
        required: false
        type: boolean
        default: false
      closure-diff-base-ref:
        description: 'Git ref to diff the built closure against (typically the PR base branch)'
        required: false
        type: string
        default: 'main'
    secrets:
      AUTHENTIK_CLIENT_ID:
        required: false
      ATTIC_TOKEN:
        required: false
      ATTIC_READ_TOKEN:
        required: false
      SOPS_AGE_KEY:
        required: false

# permissions はあえて宣言せず caller から継承する。
# reusable が caller より広い permissions を宣言すると、それを付与していない caller は
# startup_failure になる (例: pull-requests: write を無条件宣言すると build-nix を呼ぶ
# 全 caller の CI が起動失敗)。caller 側で必要な権限を付与すること:
#   - 必須: id-token: write (Attic OIDC), contents: read
#   - report-closure-diff: true を使う場合のみ: pull-requests: write (PR コメント投稿用)
# closure diff の step は continue-on-error なので、権限不足でも build 自体は失敗しない。

jobs:
  build:
    runs-on: ${{ startsWith(inputs.runner, '[') && fromJSON(inputs.runner) || inputs.runner }}
    steps:
      - name: Free disk space
        if: inputs.free-disk-space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - uses: actions/checkout@v6

      - name: Setup WireGuard VPN
        if: inputs.needs-wireguard
        uses: shinbunbun/nix-ci-workflows/.github/actions/wireguard@main
        with:
          authentik-client-id: ${{ secrets.AUTHENTIK_CLIENT_ID }}

      - name: Setup Nix + Attic (+ SOPS)
        uses: shinbunbun/nix-ci-workflows/.github/actions/setup-nix-attic@main
        with:
          install-nix: ${{ !inputs.skip-nix-install }}
          use-attic: ${{ inputs.use-attic }}
          needs-sops: ${{ inputs.needs-sops }}
          attic-read-token: ${{ secrets.ATTIC_READ_TOKEN }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Build Nix target
        env:
          MAX_JOBS: ${{ inputs.max-jobs }}
        run: |
          args=()
          if [ -n "$MAX_JOBS" ]; then
            args+=(--max-jobs "$MAX_JOBS")
          fi
          nix build "${{ inputs.build-target }}" \
            --print-build-logs \
            --show-trace \
            --out-link "result-${{ inputs.result-name }}" \
            "${args[@]}"

      - name: Compute and post closure diff
        if: inputs.report-closure-diff
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.ref_name }}
          BASE_REF: ${{ inputs.closure-diff-base-ref }}
          RESULT_NAME: ${{ inputs.result-name }}
          BUILD_TARGET: ${{ inputs.build-target }}
        run: |
          set -euo pipefail

          # base ref (= 更新前) を取得し、その時点のツリーを展開
          git fetch --depth=1 origin "$BASE_REF"
          BASE_REV="$(git rev-parse FETCH_HEAD)"
          BASE_SRC="$(mktemp -d)"
          # macOS では mktemp -d が /var/folders/... を返すが /var は /private/var への
          # symlink で、nix の path: フェッチャがパス途中の symlink を拒否する
          # (error: path '//var' is a symlink)。実パスに正規化して回避する。
          BASE_SRC="$(cd "$BASE_SRC" && pwd -P)"
          git archive FETCH_HEAD | tar -x -C "$BASE_SRC"

          # base の closure を取得。base は push 時に Attic へ送られているため
          # 実質 substitute（ダウンロード）のみで済む想定。
          # path: flakeref で git を介さずディスク上の flake.lock を直接使う。
          # --max-jobs 0 でローカルビルドを禁止し、cache miss 時は（フルビルドを
          # 暴発させず）この step を失敗させて continue-on-error でスキップさせる。
          ATTR="${BUILD_TARGET#.#}"
          nix build "path:${BASE_SRC}#${ATTR}" \
            --max-jobs 0 \
            --out-link "result-${RESULT_NAME}-base"

          # 更新前 → 更新後 の差分を計算。
          # diff-closures の引数は installable 扱いなので、out-link 名をそのまま渡すと
          # flakeref と誤解釈される (error: cannot find flake 'flake:result-...')。
          # 実 store パスに解決してから渡す。
          # diff-closures は TTY でなくても ANSI カラーを出力し (NO_COLOR/--option color 共に無効)、
          # PR コメント内で生エスケープ列として文字化けするので sed で除去する。
          DIFF="$(nix store diff-closures \
            "$(readlink -f "result-${RESULT_NAME}-base")" \
            "$(readlink -f "result-${RESULT_NAME}")" | sed -E 's/\x1b\[[0-9;]*m//g')"
          if [ -z "$DIFF" ]; then
            DIFF="(no package version changes in the runtime closure)"
          fi

          # 対象ブランチの open PR を特定（push トリガなので head から逆引き）
          PR_NUMBER="$(gh pr list --head "$HEAD_BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for branch '$HEAD_BRANCH'; skipping comment."
            echo "$DIFF"
            exit 0
          fi

          # ターゲット別 marker で sticky comment（再実行時は更新、無ければ新規）
          MARKER="<!-- closure-diff:${RESULT_NAME} -->"
          # printf のフォーマット内のバッククォートは markdown のコード装飾用リテラル
          # shellcheck disable=SC2016
          BODY="$(printf '%s\n## 📦 Closure diff: `%s`\n\nBase: `%s` (`%s`)\n\n```\n%s\n```\n' \
            "$MARKER" "$RESULT_NAME" "$BASE_REF" "${BASE_REV:0:12}" "$DIFF")"

          COMMENT_ID="$(gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq "map(select(.body | startswith(\"$MARKER\"))) | .[0].id // empty")"
          if [ -n "$COMMENT_ID" ]; then
            gh api -X PATCH "repos/${GH_REPO}/issues/comments/${COMMENT_ID}" -f body="$BODY"
          else
            gh api -X POST "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" -f body="$BODY"
          fi

      - name: Configure and push to Attic cache
        if: inputs.use-attic && inputs.push-to-cache && github.event_name == 'push'
        run: |
          ATTIC="nix run github:shinbunbun/nix-ci-workflows#attic --"
          $ATTIC login ci "${{ inputs.attic-server }}" ${{ secrets.ATTIC_TOKEN }}
          $ATTIC cache create main || echo "Cache already exists"

          echo "Pushing build result to cache..."
          $ATTIC push -j 5 main "result-${{ inputs.result-name }}" || echo "Failed to push build result (non-fatal)"
        continue-on-error: true
